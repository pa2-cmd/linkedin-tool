<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #f3f4f6;
    }
    h3 {
      margin-top: 0;
      color: #0a66c2;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    p {
      font-size: 11px;
      color: #4b5563;
      line-height: 1.4;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      background-color: #d1fae5;
      color: #065f46;
      border-radius: 9999px;
      font-size: 10px;
      font-weight: bold;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h3>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
    LinkedIn Sync Active
  </h3>
  <p>
    This extension works silently in the background. It will automatically sync your active LinkedIn session cookies whenever you browse LinkedIn.
  </p>
  <div class="status-badge">Ready to Sync</div>
</body>
</html>
